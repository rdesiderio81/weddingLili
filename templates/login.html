{% extends 'base.html' %}

{% block title %}Entrar{% endblock %}

{% block content %}
<section class="auth-section">
    <h2>Entrar</h2>
    
    <form class="auth-form" action="{{ url_for('login') }}" method="post">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn">Entrar</button>
            <p>Ainda não tem uma conta? <a href="{{ url_for('register') }}">Registre-se</a></p>
            <p>Esqueceu sua senha? <a href="{{ url_for('forgot_password') }}">Recuperar senha</a></p>
        </div>
    </form>
</section>
{% endblock %}
