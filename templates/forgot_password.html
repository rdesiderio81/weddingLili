{% extends 'base.html' %}

{% block title %}Recuperar Senha{% endblock %}

{% block content %}
<section class="auth-section">
    <h2>Recuperar Senha</h2>
    <p class="form-description">
        Informe seu email para receber um link de redefinição de senha.
    </p>
    
    <form class="auth-form" action="{{ url_for('forgot_password') }}" method="post">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ email }}" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn">Enviar Link de Recuperação</button>
            <p>Lembrou sua senha? <a href="{{ url_for('login') }}">Entrar</a></p>
        </div>
    </form>
</section>
{% endblock %}
